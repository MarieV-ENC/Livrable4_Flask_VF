{% extends "base.html" %}

{% block title %}Inscription{% endblock %}

{% block content %}

<!-- Conteneur centré horizontalement -->
<div class="row justify-content-center">

    <!-- Largeur du formulaire selon la taille de l'écran -->
    <div class="col-md-8 col-lg-6">

        <!-- Carte contenant le formulaire d'inscription -->
        <div class="card shadow-sm">
            <div class="card-body p-4">

                <!-- Titre de la page -->
                <h1 class="h3 text-center mb-4">Créer un compte</h1>

                <!-- Formulaire envoyé en POST -->
                <form method="post">

                    <!-- Token CSRF obligatoire pour sécuriser le formulaire Flask-WTF -->
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <!-- Champ identifiant -->
                    <div class="mb-3">
                        <label for="username" class="form-label">Identifiant</label>
                        <input type="text" id="username" name="username" class="form-control">
                    </div>

                    <!-- Champ adresse mail -->
                    <div class="mb-3">
                        <label for="email" class="form-label">Adresse mail</label>
                        <input type="email" id="email" name="email" class="form-control">
                    </div>

                    <!-- Champ mot de passe -->
                    <div class="mb-3">
                        <label for="password" class="form-label">Mot de passe</label>
                        <input type="password" id="password" name="password" class="form-control">
                    </div>

                    <!-- Champ de confirmation du mot de passe -->
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Confirmer le mot de passe</label>
                        <input type="password" id="confirm_password" name="confirm_password" class="form-control">
                    </div>

                    <!-- Champ de présentation facultatif -->
                    <div class="mb-3">
                        <label for="bio" class="form-label">Présentation (facultative)</label>
                        <textarea id="bio" name="bio" class="form-control" rows="4"
                            placeholder="Quelques mots sur toi..."></textarea>
                    </div>

                    <!-- Bouton de validation -->
                    <button type="submit" class="btn btn-search w-100">
                        S'inscrire
                    </button>

                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
