<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Voie de Crécerelle{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_head %}{% endblock %}
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <!-- Faucon animé -->
    <img
        id="faucon"
        src="{{ url_for('static', filename='img/faucon.png') }}"
        alt=""
    >

    <!-- Contenu de la page (pour pouvoir flouter sans toucher à l’oiseau) -->
    <div id="page" class="d-flex flex-column min-vh-100">

        {% include 'partials/navbar.html' %}

        <main class="container py-4 flex-grow-1">
            <!-- ajout pour debugger le non affichage du message d'erreur -->
             <main class="container py-4 flex-grow-1">
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-info">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
            {% block content %}{% endblock %}
        </main>

        {% include 'partials/footer.html' %}

    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script principal -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
