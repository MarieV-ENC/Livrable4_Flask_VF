<!DOCTYPE html>
<html lang="fr">
<head>
    <!-- Encodage des caractères -->
    <meta charset="UTF-8">

    <!-- Adaptation de l'affichage aux écrans mobiles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Titre par défaut de la page -->
    <title>{% block title %}Voie de Crécerelle{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Feuille de style principale -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Bloc permettant d'ajouter du CSS ou d'autres éléments dans le head -->
    {% block extra_head %}{% endblock %}
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <!-- Faucon animé -->
    <img
        id="faucon"
        src="{{ url_for('static', filename='img/faucon.png') }}"
        alt=""
    >

    <!-- Contenu de la page (pour pouvoir flouter sans toucher à l’oiseau) -->
    <div id="page" class="d-flex flex-column min-vh-100">

        <!-- Barre de navigation commune à toutes les pages -->
        {% include 'partials/navbar.html' %}

        <!-- Contenu principal de la page -->
        <main class="container py-4 flex-grow-1">

            <!-- Ajout temporaire pour afficher les messages flash et déboguer les erreurs -->
            {% with messages = get_flashed_messages() %}

                <!-- Vérifie s'il existe des messages à afficher -->
                {% if messages %}

                    <!-- Affiche chaque message dans une alerte Bootstrap -->
                    {% for message in messages %}
                        <div class="alert alert-info">{{ message }}</div>
                    {% endfor %}

                {% endif %}
            {% endwith %}

            <!-- Bloc de contenu spécifique à chaque page -->
            {% block content %}{% endblock %}

        </main>

        <!-- Pied de page commun -->
        {% include 'partials/footer.html' %}

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script JavaScript principal du site -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
