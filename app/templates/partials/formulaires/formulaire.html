<!--Template de la recherche multiple par formulaire-->
<form action="{{url_for('recherche')}}" method="get" name="recherche">

    {{form.hidden_tag()}}

    <div class="form-group">
        <label for="code_faucon"> Identifiant de l'individu </label>
        {{form.code_faucon(class="form-control") }}
        <small id="code_faucon" class="form-text text-muted"> Séléctionner l'identifiant du faucon</small>
    </div>

    <div class="form-group">
        <label for="date"> Date de passage </label>
        {{form.date_filtre(class="form-control", placeholder_="date") }}
        <small id="date" class="form-text text-muted"> Séléctionner la date du passage</small>
    </div>

    <div class="form-group">
        <label for="place"> Lieu de la détection </label>
        {{form.place(class="form-control", placeholder_="place") }}
        <small id="place" class="form-text text-muted"> Séléctionner le lieu du passage</small>
    </div>

    <p><input type="submit" value="Rechercher"></p>

</form>
